<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#1e293b" />
        </linearGradient>

        <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#facc15" />
            <stop offset="100%" stop-color="#f97316" />
        </linearGradient>

        <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#cbd5e1" />
        </linearGradient>

        <linearGradient id="rainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8" />
            <stop offset="100%" stop-color="#2563eb" />
        </linearGradient>

        <linearGradient id="windGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#38bdf8" stop-opacity="1"/>
        </linearGradient>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
        </filter>
        
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#facc15" flood-opacity="0.6"/>
        </filter>
    </defs>

    <rect x="5" y="5" width="110" height="110" rx="25" ry="25" fill="url(#bgGrad)" filter="url(#shadow)"/>

    <circle cx="75" cy="42" r="16" fill="url(#sunGrad)" filter="url(#glow)"/>

    <path d="M 18 45 Q 30 38 42 45" fill="none" stroke="url(#windGrad)" stroke-width="4" stroke-linecap="round" filter="url(#shadow)"/>
    <path d="M 12 58 Q 28 50 46 55" fill="none" stroke="url(#windGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>
    <path d="M 22 71 Q 32 66 42 71" fill="none" stroke="url(#windGrad)" stroke-width="3" stroke-linecap="round" filter="url(#shadow)"/>

    <path d="M 48 82 C 44 88, 44 92, 48 92 C 52 92, 52 88, 48 82 Z" fill="url(#rainGrad)" filter="url(#shadow)"/>
    <path d="M 62 86 C 58 92, 58 96, 62 96 C 66 96, 66 92, 62 86 Z" fill="url(#rainGrad)" filter="url(#shadow)"/>
    <path d="M 76 82 C 72 88, 72 92, 76 92 C 80 92, 80 88, 76 82 Z" fill="url(#rainGrad)" filter="url(#shadow)"/>

    <g filter="url(#shadow)">
        <rect x="40" y="52" width="45" height="24" rx="12" fill="url(#cloudGrad)"/>
        <circle cx="54" cy="52" r="14" fill="url(#cloudGrad)"/>
        <circle cx="72" cy="56" r="11" fill="url(#cloudGrad)"/>
        <circle cx="63" cy="52" r="12" fill="url(#cloudGrad)"/>
    </g>
</svg>
